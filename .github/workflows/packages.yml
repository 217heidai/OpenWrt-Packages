name: Update OpenWrt Packages
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
  - cron: 0 */12 * * *

env:
  TZ: Asia/Shanghai

jobs:
  Update_OpenWrt_Packages:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        info:
          - '{ "BRANCH": "openwrt-25.12"}'
          - '{ "BRANCH": "openwrt-24.10"}'
          - '{ "BRANCH": "openwrt-23.05"}'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          ref: ${{fromJSON(matrix.info).BRANCH}}

      - name: Setup Python 3.9.x
        uses: actions/setup-python@main
        with:
          python-version: '3.9.x'

      - name: Install Dependencies
        run: |
          sudo timedatectl set-timezone "$TZ"
          python -m pip install --upgrade pip
          pip install -U GitPython

      - name: Update OpenWrt Packages
        id: update
        run: |
          python packages.py
          rm -rf __pycache__
          echo "message=$(date)" >> $GITHUB_OUTPUT

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: ${{ steps.update.outputs.message }}

  Delete_Workflow:
    needs: [ Update_OpenWrt_Packages ]
    runs-on: ubuntu-latest
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2